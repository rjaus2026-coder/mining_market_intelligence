name: Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: mining-market-intelligence-pages
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate daily report
        run: python run_daily.py

      - name: Build static site
        run: python scripts/build_site.py

      - name: Persist generated database and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/intelligence.db reports site
          git diff --cached --quiet || git commit -m "Update mining market intelligence artifacts"
          git push origin "${GITHUB_REF_NAME}"

      - name: Send daily email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          DAILY_REPORT_RECIPIENTS: ${{ secrets.DAILY_REPORT_RECIPIENTS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python scripts/send_report.py --kind daily --date "$(date -u +%F)"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
