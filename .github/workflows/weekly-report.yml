name: Weekly Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mining-market-intelligence-pages
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate weekly report
        run: python run_weekly.py

      - name: Build static site
        run: python scripts/build_site.py

      - name: Send weekly email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          WEEKLY_REPORT_RECIPIENTS: ${{ secrets.WEEKLY_REPORT_RECIPIENTS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python scripts/send_report.py --kind weekly --date "$(date -u +%F)"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
