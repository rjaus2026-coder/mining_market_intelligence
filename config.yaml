user_agent: "FP360MarketIntel/2.0 (contact: your-email@example.com)"

# Primary source: Mining.com (US-focused = Tier-1, global = conditional).
# Secondary sources: only these names/patterns are allowed; must pass US relevance + execution angle.
# Empty = only Mining.com signals appear in reports. Add e.g. "SEC", "DOE" when feeds are added.
